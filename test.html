<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Grammar Checker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 40px;
      width: 90%;
      max-width: 500px;
      border-radius: 15px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      color: #333;
    }

    p {
      color: #666;
      margin-bottom: 25px;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      resize: none;
      font-size: 14px;
      margin-bottom: 20px;
      outline: none;
      transition: 0.3s;
    }

    textarea:focus {
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102,126,234,0.5);
    }

    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
    }

    button:hover {
      background: #5a67d8;
      transform: scale(1.05);
    }

    .result-box {
      margin-top: 25px;
      padding: 15px;
      background: #f4f6ff;
      border-radius: 8px;
      font-size: 14px;
      color: #333;
      display: none;
    }

    .loading {
      color: #667eea;
      font-weight: bold;
      margin-top: 15px;
      display: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🎓 Smart Grammar Checker</h1>
    <p>Improve your English instantly</p>

    <textarea id="textInput" placeholder="Type your sentence here..."></textarea>
    <button onclick="checkGrammar()">Check Grammar</button>

    <div class="loading" id="loading">Checking...</div>

    <div class="result-box" id="resultBox"></div>
  </div>

  <script>
    function checkGrammar() {
      const text = document.getElementById("textInput").value;
      const resultBox = document.getElementById("resultBox");
      const loading = document.getElementById("loading");

      if (!text.trim()) {
        alert("Please enter a sentence!");
        return;
      }

      loading.style.display = "block";
      resultBox.style.display = "none";

      fetch("http://localhost:5000/analyze", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text: text })
      })
      .then(response => response.json())
      .then(data => {
        loading.style.display = "none";
        resultBox.style.display = "block";
        resultBox.innerHTML = `
          <strong>Original:</strong> ${data.original} <br><br>
          <strong>Corrected:</strong> ${data.corrected}
        `;
      })
      .catch(error => {
        loading.style.display = "none";
        alert("Error connecting to server!");
        console.error(error);
      });
    }
  </script>

</body>
</html>
